<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: white;
      overflow: hidden;
    }
    h1 { font-size: 2.5rem; color: #00d4aa; margin-bottom: 10px; letter-spacing: 6px; text-shadow: 0 0 20px #00d4aa88; }
    #scoreboard { display: flex; gap: 40px; margin-bottom: 14px; font-size: 1rem; letter-spacing: 2px; }
    #scoreboard span { color: #aaa; }
    #scoreboard strong { color: #00d4aa; }
    #gameCanvas { border: 2px solid #00d4aa44; border-radius: 8px; box-shadow: 0 0 30px #00d4aa22; display: block; touch-action: none; }
    #overlay { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    #overlay p { font-size: 1rem; color: #aaa; letter-spacing: 2px; }
    #startBtn { margin-top: 8px; padding: 14px 36px; background: #00d4aa; color: #1a1a2e; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; font-family: 'Courier New', monospace; letter-spacing: 3px; cursor: pointer; transition: all 0.2s; }
    #startBtn:hover { background: #00ffcc; transform: scale(1.05); }
    #controls { display: none; margin-top: 18px; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 8px; }
    .ctrl-btn { background: #ffffff18; border: 1px solid #00d4aa44; border-radius: 8px; color: #00d4aa; font-size: 1.6rem; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; }
    .ctrl-btn:active { background: #00d4aa33; }
    @media (max-width: 600px) { h1 { font-size: 1.8rem; } #controls { display: grid; } }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="scoreboard">
    <div><span>SCORE </span><strong id="score">0</strong></div>
    <div><span>BEST &nbsp;</span><strong id="best">0</strong></div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="overlay">
    <p id="overlayMsg">PRESS START TO PLAY</p>
    <button id="startBtn">START</button>
  </div>
  <div id="controls">
    <div></div>
    <div class="ctrl-btn" id="btnUp">▲</div>
    <div></div>
    <div class="ctrl-btn" id="btnLeft">◄</div>
    <div class="ctrl-btn" id="btnDown">▼</div>
    <div class="ctrl-btn" id="btnRight">►</div>
  </div>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlayMsg');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const CELL = 20;
  const SIZE = Math.min(window.innerWidth - 20, window.innerHeight - 220, 520);
  const COLS = Math.floor(SIZE / CELL);
  const ROWS = Math.floor(SIZE / CELL);
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  let snake, dir, nextDir, food, score, best = 0, gameLoop, running = false;

  function init() {
    snake = [{ x: Math.floor(COLS/2), y: Math.floor(ROWS/2) }];
    dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
    food = spawnFood(); score = 0; scoreEl.textContent = 0;
  }

  function spawnFood() {
    let pos;
    do { pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) }; }
    while (snake.some(s => s.x===pos.x && s.y===pos.y));
    return pos;
  }

  function step() {
    dir = {...nextDir};
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) return endGame();
    if (snake.some(s => s.x===head.x && s.y===head.y)) return endGame();
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) {
      score++; scoreEl.textContent = score;
      if (score>best) { best=score; bestEl.textContent=best; }
      food = spawnFood();
    } else { snake.pop(); }
    draw();
  }

  function draw() {
    ctx.fillStyle = '#0f0f1a'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = '#ffffff08'; ctx.lineWidth = 0.5;
    for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
    for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}
    ctx.shadowColor='#ff4d6d66'; ctx.shadowBlur=16; ctx.fillStyle='#ff4d6d';
    ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    snake.forEach((seg,i)=>{
      const ratio=1-i/snake.length;
      ctx.fillStyle=i===0?'#00ffcc':`rgba(0,${Math.floor(150+ratio*105)},${Math.floor(100+ratio*54)},1)`;
      const pad=i===0?1:2;
      ctx.beginPath(); ctx.roundRect(seg.x*CELL+pad,seg.y*CELL+pad,CELL-pad*2,CELL-pad*2,i===0?6:4); ctx.fill();
      if(i===0){
        ctx.fillStyle='#1a1a2e';
        const ex=dir.x===1?0.65:dir.x===-1?0.2:0.3, ey=dir.y===1?0.65:dir.y===-1?0.2:0.3;
        const ex2=dir.y!==0?0.65:ex, ey2=dir.x!==0?0.65:ey;
        ctx.beginPath(); ctx.arc(seg.x*CELL+CELL*ex,seg.y*CELL+CELL*ey,2.5,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(seg.x*CELL+CELL*ex2,seg.y*CELL+CELL*ey2,2.5,0,Math.PI*2); ctx.fill();
      }
    });
  }

  function endGame() {
    clearInterval(gameLoop); running=false;
    overlay.style.display='flex';
    overlayMsg.textContent=`GAME OVER — SCORE: ${score}`;
    overlayMsg.style.color='#ff4d6d';
    startBtn.textContent='PLAY AGAIN';
  }

  function startGame() {
    overlay.style.display='none'; init(); draw(); running=true;
    gameLoop=setInterval(step,120);
  }

  startBtn.addEventListener('click', startGame);
  document.addEventListener('keydown', e=>{
    if(!running){if(e.key==='Enter'||e.key===' ')startGame();return;}
    const moves={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
    const m=moves[e.key];
    if(m&&!(m.x===-dir.x&&m.y===-dir.y)){nextDir=m;e.preventDefault();}
  });

  function setDir(dx,dy){if(!(dx===-dir.x&&dy===-dir.y))nextDir={x:dx,y:dy};}
  document.getElementById('btnUp').addEventListener('click',()=>setDir(0,-1));
  document.getElementById('btnDown').addEventListener('click',()=>setDir(0,1));
  document.getElementById('btnLeft').addEventListener('click',()=>setDir(-1,0));
  document.getElementById('btnRight').addEventListener('click',()=>setDir(1,0));

  let touchStartX, touchStartY;
  canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX, dy=e.changedTouches[0].clientY-touchStartY;
    if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?1:-1,0);}else{setDir(0,dy>0?1:-1);}
    e.preventDefault();
  },{passive:false});

  draw();
</script>
</body>
</html>

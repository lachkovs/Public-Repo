<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100dvh;
      font-family: 'Courier New', monospace;
      color: white;
      overflow: hidden;
    }
    #header { display:flex; flex-direction:column; align-items:center; padding:8px 0 4px; flex-shrink:0; }
    h1 { font-size:clamp(1.4rem,5vw,2.2rem); color:#00d4aa; letter-spacing:6px; text-shadow:0 0 20px #00d4aa88; }
    #scoreboard { display:flex; gap:30px; font-size:clamp(0.75rem,3vw,1rem); letter-spacing:2px; margin-top:4px; }
    #scoreboard span { color:#aaa; }
    #scoreboard strong { color:#00d4aa; }
    #canvasWrap { flex:1; display:flex; align-items:center; justify-content:center; position:relative; width:100%; min-height:0; }
    #gameCanvas { border:2px solid #00d4aa44; border-radius:8px; box-shadow:0 0 30px #00d4aa22; display:block; touch-action:none; }
    #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
    #overlayMsg { font-size:clamp(0.85rem,3.5vw,1rem); color:#aaa; letter-spacing:2px; text-align:center; }
    #startBtn { padding:14px 36px; background:#00d4aa; color:#1a1a2e; border:none; border-radius:8px; font-size:clamp(1rem,4vw,1.1rem); font-weight:bold; font-family:'Courier New',monospace; letter-spacing:3px; cursor:pointer; transition:all 0.2s; }
    #startBtn:hover { background:#00ffcc; transform:scale(1.05); }
    #startBtn:active { transform:scale(0.97); }
    #dpad { flex-shrink:0; display:none; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:8px; width:min(240px,68vw); padding:10px 0 18px; }
    .ctrl-btn { background:#ffffff15; border:1.5px solid #00d4aa55; border-radius:10px; color:#00d4aa; font-size:clamp(1.4rem,7vw,1.8rem); cursor:pointer; display:flex; align-items:center; justify-content:center; aspect-ratio:1; user-select:none; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
    .ctrl-btn:active { background:#00d4aa40; }
    @media (hover:none),(max-width:600px) { #dpad { display:grid; } }
  </style>
</head>
<body>
  <div id="header">
    <h1>SNAKE</h1>
    <div id="scoreboard">
      <div><span>SCORE </span><strong id="score">0</strong></div>
      <div><span>BEST &nbsp;</span><strong id="best">0</strong></div>
    </div>
  </div>
  <div id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
      <p id="overlayMsg">PRESS START TO PLAY</p>
      <button id="startBtn">START</button>
    </div>
  </div>
  <div id="dpad">
    <div></div>
    <div class="ctrl-btn" id="btnUp">&#9650;</div>
    <div></div>
    <div class="ctrl-btn" id="btnLeft">&#9664;</div>
    <div class="ctrl-btn" id="btnDown">&#9660;</div>
    <div class="ctrl-btn" id="btnRight">&#9654;</div>
  </div>
<script>
  const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  const overlay=document.getElementById('overlay'),overlayMsg=document.getElementById('overlayMsg');
  const startBtn=document.getElementById('startBtn'),scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  const header=document.getElementById('header'),dpad=document.getElementById('dpad');
  const CELL=20;

  function calcSize(){
    const mob=window.matchMedia('(hover:none)').matches||window.innerWidth<=600;
    const dpadH=mob?180:0, hH=header.offsetHeight||60;
    const av=Math.min(window.innerWidth-16, window.innerHeight-hH-dpadH-16);
    return Math.max(Math.floor(av/CELL)*CELL, CELL*8);
  }
  function setupCanvas(){ const s=calcSize(); canvas.width=canvas.height=s; }
  setupCanvas();

  const COLS=()=>Math.floor(canvas.width/CELL), ROWS=()=>Math.floor(canvas.height/CELL);
  let snake,dir,nextDir,food,score,best=0,gameLoop,running=false;

  function init(){
    snake=[{x:Math.floor(COLS()/2),y:Math.floor(ROWS()/2)}];
    dir={x:1,y:0}; nextDir={x:1,y:0};
    food=spawnFood(); score=0; scoreEl.textContent=0;
  }
  function spawnFood(){
    let p;
    do{ p={x:Math.floor(Math.random()*COLS()),y:Math.floor(Math.random()*ROWS())}; }
    while(snake.some(s=>s.x===p.x&&s.y===p.y));
    return p;
  }
  function step(){
    dir={...nextDir};
    const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(h.x<0||h.x>=COLS()||h.y<0||h.y>=ROWS()) return endGame();
    if(snake.some(s=>s.x===h.x&&s.y===h.y)) return endGame();
    snake.unshift(h);
    if(h.x===food.x&&h.y===food.y){
      score++; scoreEl.textContent=score;
      if(score>best){best=score;bestEl.textContent=best;}
      food=spawnFood();
    } else snake.pop();
    draw();
  }
  function draw(){
    const w=canvas.width, hh=canvas.height;
    ctx.fillStyle='#0f0f1a'; ctx.fillRect(0,0,w,hh);
    ctx.strokeStyle='#ffffff08'; ctx.lineWidth=0.5;
    for(let x=0;x<=COLS();x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,hh);ctx.stroke();}
    for(let y=0;y<=ROWS();y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(w,y*CELL);ctx.stroke();}
    ctx.shadowColor='#ff4d6d88'; ctx.shadowBlur=16; ctx.fillStyle='#ff4d6d';
    ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    snake.forEach((seg,i)=>{
      const r=1-i/snake.length;
      ctx.fillStyle=i===0?'#00ffcc':'rgba(0,'+Math.floor(150+r*105)+','+Math.floor(100+r*54)+',1)';
      const p=i===0?1:2;
      ctx.beginPath(); ctx.roundRect(seg.x*CELL+p,seg.y*CELL+p,CELL-p*2,CELL-p*2,i===0?6:4); ctx.fill();
      if(i===0){
        ctx.fillStyle='#1a1a2e';
        const ex=dir.x===1?0.65:dir.x===-1?0.2:0.3, ey=dir.y===1?0.65:dir.y===-1?0.2:0.3;
        const ex2=dir.y!==0?0.65:ex, ey2=dir.x!==0?0.65:ey;
        ctx.beginPath(); ctx.arc(seg.x*CELL+CELL*ex,seg.y*CELL+CELL*ey,2.5,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(seg.x*CELL+CELL*ex2,seg.y*CELL+CELL*ey2,2.5,0,Math.PI*2); ctx.fill();
      }
    });
  }
  function endGame(){
    clearInterval(gameLoop); running=false;
    overlay.style.display='flex';
    overlayMsg.textContent='GAME OVER - SCORE: '+score;
    overlayMsg.style.color='#ff4d6d';
    startBtn.textContent='PLAY AGAIN';
  }
  function startGame(){ overlay.style.display='none'; init(); draw(); running=true; gameLoop=setInterval(step,120); }
  startBtn.addEventListener('click',startGame);
  document.addEventListener('keydown',e=>{
    if(!running){if(e.key==='Enter'||e.key===' ')startGame();return;}
    const moves={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
    const m=moves[e.key];
    if(m&&!(m.x===-dir.x&&m.y===-dir.y)){nextDir=m;e.preventDefault();}
  });
  function setDir(dx,dy){if(!(dx===-dir.x&&dy===-dir.y))nextDir={x:dx,y:dy};}
  document.getElementById('btnUp').addEventListener('click',()=>setDir(0,-1));
  document.getElementById('btnDown').addEventListener('click',()=>setDir(0,1));
  document.getElementById('btnLeft').addEventListener('click',()=>setDir(-1,0));
  document.getElementById('btnRight').addEventListener('click',()=>setDir(1,0));
  let tx,ty;
  canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
    e.preventDefault();
  },{passive:false});
  window.addEventListener('resize',()=>{setupCanvas();if(!running)draw();});
  draw();
</script>
</body>
</html>
